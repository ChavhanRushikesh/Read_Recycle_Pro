<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Login Page</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-image: url("https://img.freepik.com/free-photo/book-composition-with-open-book_23-2147690555.jpg");
  background-size: cover;
  background-position: center;
}

.wrapper {
  width: 420px;
  background: transparent;
  border: 2px solid rgba(255, 255, 255, .2);
  backdrop-filter: blur(3px);
  color: #fff;
  border-radius: 12px;
  padding: 30px 30px;
}

.wrapper h1 {
  font-size: 36px;
  text-align: center;
  margin-bottom:50px;
}

.wrapper .input-box {
  position: relative;
  width: 100%;
  height: 50px;
  margin: 30px 0;
}

.input-box.password-input {
  margin-bottom: 30px; 
}

.input-box input {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  outline: none;
  border: 2px solid rgba(255, 255, 255, .2);
  border-radius: 40px;
  font-size: 16px;
  color: #fff;
  padding: 20px 45px 20px 20px;
}

.input-box input::placeholder {
  color: #fff;
}

.input-box i {
  position: absolute;
  right: 20px;
  top: 30%;
  transform: translate(-50%);
  font-size: 20px;
}

.wrapper .btn {
  width: 100%;
  height: 45px;
  background: #fff;
  border: none;
  outline: none;
  border-radius: 40px;
  box-shadow: 0 0 10px rgba(0, 0, 0, .1);
  cursor: pointer;
  font-size: 16px;
  color: #333;
  font-weight: 600;
  margin-top: 20px; /* Add space above button */
}

    </style>
</head>
<body>
  <div class="wrapper">
    <form action="connection1.php" method="POST">
      <h1>Admin Login</h1>
      <div class="input-box">
    <input type="text" id="user" name="user" placeholder="Enter Username" required>
    <i class="fas fa-user"></i>
</div>
  <div class="input-box password-input">
    <input type="password" id="pass" name="pass" placeholder="Password" required>
	<div class="eye-area">
                     <div  class="eye-box" onclick="myLogPassword()">
                      <i class="fa-regular fa-eye" id="eye"></i>
                      <i class="fa-regular fa-eye-slash" id="eye-slash"></i>
                   </div>
                 </div>
</div>
      <button type="submit" name="apply" class="btn">Login</button>
    </form>
  </div>
  <script>
 function validation() {
    var id = document.f1.user.value;
    var ps = document.f1.pass.value;
    if (id === "" || ps === "") {
        alert("Username and Password fields are required");
        return false;
    }
}


function myLogPassword(){
         var a = document.getElementById("pass");
         var b = document.getElementById("eye");
         var c = document.getElementById("eye-slash");
         if(a.type === "password"){
            a.type = "text";
            b.style.opacity = "0";
            c.style.opacity = "1";
         }else{
            a.type = "password";
            b.style.opacity = "1";
            c.style.opacity = "0";
         }
        }
</script>			
</body>
</html>
